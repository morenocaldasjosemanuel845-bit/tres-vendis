<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f8; margin:0; }
    .contenedor { max-width:420px; margin:60px auto; background:#fff; padding:28px; border-radius:14px; box-shadow:0 8px 24px rgba(0,0,0,.08); }
    h1 { margin-top:0; font-size:28px; }
    label { display:block; margin:14px 0 6px; font-weight:700; }
    input { width:100%; padding:12px; border:1px solid #d0d7de; border-radius:8px; box-sizing:border-box; }
    button { width:100%; margin-top:18px; padding:12px; border:none; border-radius:8px; background:#111827; color:#fff; font-weight:700; cursor:pointer; }
    .alerta { margin-bottom:12px; padding:10px; border-radius:8px; background:#fee2e2; color:#991b1b; }
    .nota { margin-top:16px; color:#4b5563; font-size:14px; }
  </style>
</head>
<body>
  <div class="contenedor">
    <h1>Panel de administración</h1>

    {% with mensajes = get_flashed_messages(with_categories=true) %}
      {% if mensajes %}
        {% for categoria, mensaje in mensajes %}
          <div class="alerta">{{ mensaje }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">
      <label for="usuario">Usuario</label>
      <input type="text" id="usuario" name="usuario" placeholder="Ingresa tu usuario" required>

      <label for="clave">Contraseña</label>
      <input type="password" id="clave" name="clave" placeholder="Ingresa tu contraseña" required>

      <button type="submit">Ingresar</button>
    </form>

    <p class="nota">Usuario por defecto: <strong>admin</strong> | Contraseña por defecto: <strong>123456</strong></p>
  </div>
</body>
</html>
