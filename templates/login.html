<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Panel de control - Panes Artesanales Las 3 Bendiciones</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="contenedor">
        <img src="{{ url_for('static', filename='logopan.png') }}" alt="Logo Panes Artesanales Las 3 Bendiciones" class="logo">
        <h1>Ingreso al panel de control</h1>
        <h2>"Azuvalentina y Kiory"</h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <p class="mensaje-error">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" class="form-admin">
            <input type="text" name="usuario" placeholder="Usuario" required>
            <input type="password" name="clave" placeholder="Contraseña" required>
            <button type="submit">Ingresar</button>
        </form>

        <p>
            <a href="{{ url_for('tienda_virtual') }}">Ir a la tienda virtual</a>
        </p>
    </div>
</body>
</html>
