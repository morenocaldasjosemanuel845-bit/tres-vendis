<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Panes Artesanales Las 3 Bendiciones{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="contenedor">
        <img src="{{ url_for('static', filename='logopan.png') }}" alt="Logo" class="logo">

        {% if contenido_error %}
            <div class="mensaje mensaje-error">{{ contenido_error }}</div>
        {% endif %}

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mensaje {{ 'mensaje-exito' if category == 'ok' else 'mensaje-error' }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
