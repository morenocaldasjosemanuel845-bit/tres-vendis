<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar producto - Panes Artesanales Las 3 Bendiciones</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="contenedor">
        <img src="{{ url_for('static', filename='logopan.png') }}" alt="Logo Panes Artesanales Las 3 Bendiciones" class="logo">
        <h1>Agregar producto - Panes Artesanales Las 3 Bendiciones</h1>
        <h2>"Azuvalentina y Kiory"</h2>

        <form method="POST" enctype="multipart/form-data" class="form-admin">
            <input type="text" name="nombre" placeholder="Nombre del producto" required>
            <input type="number" step="0.01" name="precio" placeholder="Precio" required>
            <input type="file" name="imagen" accept="image/*" required>
            <button type="submit">Guardar producto</button>
        </form>

        <p>
            <a href="{{ url_for('panel_de_control') }}">Volver al panel de control</a>
        </p>
    </div>
</body>
</html>
