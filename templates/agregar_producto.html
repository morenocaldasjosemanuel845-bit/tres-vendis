{% extends 'base.html' %}
{% block title %}Agregar producto{% endblock %}
{% block content %}
<h1>Agregar producto</h1>
<h2>"Azuvalentina y Kiory"</h2>

<form method="POST" enctype="multipart/form-data" class="form-admin card">
    <input type="text" name="nombre" placeholder="Nombre del producto" required>
    <input type="number" step="0.01" min="0" name="precio" placeholder="Precio" required>
    <input type="file" name="imagen" accept="image/*">
    <button type="submit">Guardar producto</button>
</form>

<p><a class="link-simple" href="{{ url_for('panel_de_control') }}">Volver al panel de control</a></p>
{% endblock %}
